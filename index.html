<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>超人导师</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        background: #f7f4ee;
        color: #17202a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(88vw, 680px);
        text-align: center;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(40px, 8vw, 84px);
        font-weight: 800;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        font-size: clamp(18px, 3vw, 26px);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>超人导师</h1>
      <p>官方网站正在准备中。</p>
    </main>
  </body>
</html>
