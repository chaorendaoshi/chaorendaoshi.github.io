<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>超人导师</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #111;
        --yellow: #ffd948;
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: var(--yellow);
        color: var(--ink);
        font-family: var(--font);
        letter-spacing: 0;
      }

      a,
      button {
        color: inherit;
        font: inherit;
      }

      .page {
        display: grid;
        min-height: 100svh;
        padding: clamp(14px, 2.4vw, 42px);
      }

      .shell {
        display: grid;
        min-height: calc(100svh - clamp(28px, 4.8vw, 84px));
        grid-template-rows: auto 1fr auto;
        gap: clamp(14px, 2.6vh, 28px);
        padding: clamp(16px, 2.6vw, 42px);
        background: var(--yellow);
      }

      .whiteboard {
        position: relative;
        overflow: hidden;
        border: 4px solid var(--ink);
        background: #fff;
        box-shadow: 8px 8px 0 var(--ink);
      }

      .whiteboard > * {
        position: relative;
        z-index: 1;
      }

      .quote {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        align-items: end;
        column-gap: clamp(8px, 1.1vw, 16px);
        row-gap: 8px;
        max-width: none;
        margin: 0;
        padding: clamp(16px, 2vw, 28px) clamp(16px, 2vw, 28px) 0;
        font-size: clamp(17px, 2.1vw, 32px);
        font-weight: 800;
        line-height: 1.38;
      }

      .quote-text {
        max-width: 920px;
      }

      .quote-credit {
        align-self: end;
        justify-self: end;
        margin: 0 0 clamp(10px, 1.1vw, 16px);
        font-size: clamp(16px, 1.55vw, 24px);
        font-weight: 900;
        white-space: nowrap;
      }

      .quote-avatar {
        width: clamp(96px, 10.2vw, 152px);
        height: clamp(96px, 10.2vw, 152px);
        align-self: end;
        image-rendering: pixelated;
      }

      .main-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: clamp(16px, 2.4vw, 34px);
      }

      .panel {
        display: grid;
        width: 100%;
        min-height: 100%;
        align-content: space-between;
        padding: clamp(18px, 3vw, 44px);
        border-radius: 0;
        text-align: left;
        text-decoration: none;
        cursor: pointer;
        transform: rotate(0deg) scale(1);
        transform-origin: 50% 54%;
        transition:
          transform 420ms cubic-bezier(0.34, 1.56, 0.64, 1),
          filter 150ms ease,
          box-shadow 180ms ease;
        will-change: transform;
      }

      .social-card {
        appearance: none;
        position: relative;
        overflow: hidden;
        display: grid;
        width: clamp(72px, 7vw, 108px);
        aspect-ratio: 1;
        place-items: center;
        padding: clamp(15px, 1.7vw, 24px);
        border-radius: 0;
        background: #ffe2b8;
        color: inherit;
        text-align: center;
        text-decoration: none;
        cursor: pointer;
        transform: rotate(0deg) scale(1);
        transition:
          transform 420ms cubic-bezier(0.34, 1.56, 0.64, 1),
          filter 150ms ease,
          box-shadow 180ms ease;
        will-change: transform;
      }

      .panel.left:hover {
        transform: rotate(-3deg) scale(1.01);
      }

      .panel.consult:hover {
        transform: rotate(3deg) scale(1.01);
      }

      .social-card:nth-child(1):hover {
        transform: rotate(-3deg) scale(1.01);
      }

      .social-card:nth-child(2):hover {
        transform: rotate(3deg) scale(1.01);
      }

      .social-card:nth-child(3):hover {
        transform: rotate(-3deg) scale(1.01);
      }

      .panel.left:active,
      .panel.consult:active,
      .social-card:active,
      .social-card:nth-child(1):active,
      .social-card:nth-child(2):active,
      .social-card:nth-child(3):active {
        filter: brightness(0.86);
        box-shadow: 5px 5px 0 var(--ink);
        transform: rotate(0deg) scale(0.96);
        transition-duration: 90ms;
      }

      .panel:focus-visible {
        outline: 4px solid #fff;
        outline-offset: 5px;
      }

      .social-card:focus-visible {
        outline: 4px solid #fff;
        outline-offset: 5px;
      }

      .title {
        margin: 0;
        font-size: clamp(56px, 10vw, 148px);
        font-weight: 900;
        line-height: 0.95;
        letter-spacing: 0;
        white-space: nowrap;
      }

      .copy {
        margin-top: clamp(20px, 4vh, 54px);
        font-size: clamp(18px, 2vw, 31px);
        font-weight: 800;
        line-height: 1.38;
      }

      .copy p,
      .copy ul {
        margin: 0;
      }

      .dimensions,
      .prices {
        padding: 0;
        list-style: none;
      }

      .dimensions li::before,
      .prices li::before {
        content: "- ";
      }

      .wechat {
        margin-top: clamp(18px, 4vh, 58px);
      }

      .prices,
      .coupon {
        margin-top: clamp(18px, 3.8vh, 54px);
      }

      .socials {
        display: flex;
        align-items: center;
        gap: clamp(12px, 1.3vw, 22px);
      }

      .social-card svg {
        width: 100%;
        height: 100%;
        fill: currentColor;
      }

      .douyin-icon {
        color: #111;
      }

      .copy-toast {
        position: fixed;
        z-index: 40;
        right: clamp(16px, 3vw, 36px);
        bottom: clamp(16px, 3vw, 36px);
        padding: 12px 16px;
        border: 3px solid var(--ink);
        background: #fff;
        color: var(--ink);
        box-shadow: 5px 5px 0 var(--ink);
        font-size: 16px;
        font-weight: 900;
        opacity: 0;
        pointer-events: none;
        transform: translateY(14px);
        transition:
          opacity 160ms ease,
          transform 160ms ease;
      }

      .copy-toast.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 920px) {
        .shell {
          min-height: calc(100svh - 28px);
          padding: 0;
        }

        .main-grid {
          grid-template-columns: 1fr;
        }

        .title {
          font-size: clamp(48px, 15vw, 92px);
        }

        .quote {
          grid-template-columns: 1fr auto auto;
          font-size: clamp(16px, 4vw, 24px);
        }

        .quote-text {
          grid-column: 1 / -1;
        }

        .quote-credit {
          margin-right: 0;
        }

        .quote-avatar {
          justify-self: end;
        }

        .copy {
          font-size: clamp(17px, 4.8vw, 26px);
        }
      }

      @media (max-height: 720px) and (min-width: 921px) {
        .quote {
          font-size: clamp(15px, 1.7vw, 24px);
        }

        .title {
          font-size: clamp(48px, 7.4vw, 112px);
        }

        .copy {
          margin-top: 24px;
          font-size: clamp(15px, 1.55vw, 24px);
        }

        .prices,
        .coupon {
          margin-top: 18px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .panel {
          transition: none;
        }

        .panel:hover,
        .panel:active,
        .social-card:hover,
        .social-card:active,
        .social-card:nth-child(1):active,
        .social-card:nth-child(2):active,
        .social-card:nth-child(3):active {
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="shell" aria-label="超人导师首页">
        <div class="quote whiteboard">
          <p class="quote-text">
            只有自己的欲望和客观规律这两者是真实存在的，是我们必须要去遵循的
          </p>
          <p class="quote-credit">— 超人导师</p>
          <img class="quote-avatar" src="assets/superman-mentor-pixel-96.svg" alt="超人导师像素头像">
        </div>

        <div class="main-grid">
          <a class="panel left whiteboard" href="准超人六维测试题库.md" aria-labelledby="become-title">

            <div class="copy">
              <p class="wechat">vx@Wine2003218</p>
              <ul class="prices">

                <li>24小时内文字咨询98</li>
              </ul>
              <p class="coupon">携“成为超人”检测报告可获限时优惠</p>
            </div>
          </button>
        </div>

        <nav class="socials" aria-label="社交媒体">
          <a class="social-card whiteboard" href="https://x.com/wine_gray0218" target="_blank" rel="noopener noreferrer" aria-label="访问 X 平台">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M14.234 10.162 22.977 0h-2.072l-7.591 8.824L7.251 0H.258l9.168 13.343L.258 24H2.33l8.016-9.318L16.749 24h6.993zm-2.837 3.299-.929-1.329L3.076 1.56h3.182l5.965 8.532.929 1.329 7.754 11.09h-3.182z"/>
            </svg>
          </a>
          <a class="social-card whiteboard douyin-icon" href="https://v.douyin.com/MyO9Hnrkpio/" target="_blank" rel="noopener noreferrer" aria-label="访问抖音">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/>
            </svg>

          <button class="social-card whiteboard" type="button" data-toast="视频号搜索：超人导师" aria-label="微信视频号搜索提示">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 2.25c4.25 0 7.7 2.58 7.7 5.76 0 1.3-.58 2.5-1.56 3.46l2.1 3.75-4.36-2.03c-1.13.37-2.45.58-3.88.58-4.25 0-7.7-2.58-7.7-5.76S7.75 2.25 12 2.25Zm-4.56 5.9a1.12 1.12 0 1 0 0-2.24 1.12 1.12 0 0 0 0 2.24Zm5.03 0a1.12 1.12 0 1 0 0-2.24 1.12 1.12 0 0 0 0 2.24Zm3.14 5.88c2.73.42 4.7 2.13 4.7 4.14 0 2.34-2.67 4.24-5.96 4.24-1.02 0-1.98-.18-2.82-.51L8.1 23.75l1.36-3.06c-.67-.7-1.07-1.56-1.07-2.52 0-1.95 1.7-3.58 4.02-4.08.78.1 1.6.1 2.4 0 .27-.02.54-.04.8-.06Zm-3.28 4.04a.83.83 0 1 0 0-1.66.83.83 0 0 0 0 1.66Zm4.05 0a.83.83 0 1 0 0-1.66.83.83 0 0 0 0 1.66Z"/>
            </svg>
          </button>
        </nav>
      </section>
    </main>

    <div class="copy-toast" role="status" aria-live="polite"></div>

    <script>
      const copyToast = document.querySelector(".copy-toast");
      let toastTimer;

      document.querySelectorAll("[data-copy-wechat]").forEach((trigger) => {
        trigger.addEventListener("click", async () => {
          const wechat = trigger.dataset.copyWechat;
          try {
            await navigator.clipboard.writeText(wechat);
          } catch {
            const textArea = document.createElement("textarea");
            textArea.value = wechat;
            textArea.setAttribute("readonly", "");
            textArea.style.position = "fixed";
            textArea.style.opacity = "0";
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand("copy");
            textArea.remove();
          }

          copyToast?.classList.add("is-visible");
          if (copyToast) copyToast.textContent = `已复制微信号：${wechat}`;
          window.clearTimeout(toastTimer);
          toastTimer = window.setTimeout(() => {
            copyToast?.classList.remove("is-visible");
          }, 1600);
        });
      });

      document.querySelectorAll("[data-toast]").forEach((trigger) => {
        trigger.addEventListener("click", () => {
          if (copyToast) copyToast.textContent = trigger.dataset.toast;
          window.clearTimeout(toastTimer);
          copyToast?.classList.add("is-visible");
          toastTimer = window.setTimeout(() => {
            copyToast?.classList.remove("is-visible");
          }, 1600);
        });
      });
    </script>
  </body>
</html>
