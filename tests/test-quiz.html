<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>准超人六维测试答题 - 超人导师</title>
    <link rel="stylesheet" href="six-test.css">
  </head>
  <body>
    <main class="page">
      <section class="shell quiz">
        <header class="topbar whiteboard">
          <a class="brand" href="../index.html">超人<span data-fill-default>导</span>师</a>
          <div class="counter" id="topCounter">0 / 120 已答</div>
        </header>

        <div class="progress-card whiteboard">
          <div class="progress-meta">
            <span id="questionCount">第 1 / 120 题</span>
            <span id="dimensionNow">主体性</span>
          </div>
          <div class="progress-track" aria-hidden="true"><div class="progress-fill" id="progressFill"></div></div>
        </div>

        <article class="question-card whiteboard" id="questionCard">
          <div class="swipe-glow swipe-glow-no" aria-hidden="true">否</div>
          <div class="swipe-glow swipe-glow-yes" aria-hidden="true">是</div>
          <div class="dimension-badge" id="dimensionBadge">主体性</div>
          <h1 class="question-title" id="questionTitle"></h1>
          <p class="swipe-hint">左滑选否，右滑选是</p>
          <div class="options" id="options"></div>
        </article>

        <nav class="quiz-actions">
          <button class="comic-button secondary" id="prevButton" type="button">上一题</button>
          <a class="comic-button secondary" href="test-intro.html">返回说明</a>
        </nav>
      </section>
    </main>
    <div class="toast" id="toast"></div>
    <script src="../assets/six-dimensions-questions.js"></script>
    <script src="six-test.js"></script>
    <script>
      let state = loadState();
      const questions = getQuestions();
      const topCounter = document.getElementById("topCounter");
      const questionCount = document.getElementById("questionCount");
      const dimensionNow = document.getElementById("dimensionNow");
      const progressFill = document.getElementById("progressFill");
      const questionCard = document.getElementById("questionCard");
      const dimensionBadge = document.getElementById("dimensionBadge");
      const questionTitle = document.getElementById("questionTitle");
      const optionsEl = document.getElementById("options");
      const prevButton = document.getElementById("prevButton");
      let isAnimating = false;
      let dragStartX = 0;
      let dragStartY = 0;
      let dragX = 0;
      let isDragging = false;
      const swipeThreshold = 96;

      if (!questions.length) showToast("题库没有加载成功");
      if (isComplete(state)) location.href = "test-result.html";

      function applyCardMotion(x, withTransition = false) {
        const limited = Math.max(Math.min(x, 190), -190);
        const ratio = Math.min(Math.abs(limited) / 160, 1);
        const rotate = limited / 18;
        const red = Math.round(255 * ratio);
        const green = Math.round((limited > 0 ? 70 : 96) * ratio);
        const blue = Math.round((limited > 0 ? 58 : 255) * ratio);
        questionCard.style.transition = withTransition ? "" : "none";
        questionCard.style.transform = `translateX(${limited}px) rotate(${rotate}deg)`;
        questionCard.style.backgroundColor = `rgb(${255 - (255 - red) * ratio}, ${255 - (255 - green) * ratio}, ${255 - (255 - blue) * ratio})`;
        questionCard.style.setProperty("--yes-opacity", limited > 0 ? ratio : 0);
        questionCard.style.setProperty("--no-opacity", limited < 0 ? ratio : 0);
      }

      function resetCardMotion() {
        questionCard.style.transition = "";
        questionCard.style.transform = "";
        questionCard.style.backgroundColor = "";
        questionCard.style.opacity = "";
        questionCard.style.setProperty("--yes-opacity", 0);
        questionCard.style.setProperty("--no-opacity", 0);
      }

      function answerQuestion(option, direction) {
        if (isAnimating) return;
        isAnimating = true;
        state.answers[questions[state.currentIndex].id] = {
          dimension: questions[state.currentIndex].dimension,
          score: option.score,
          label: option.label
        };
        saveState(state);
        questionCard.classList.add(direction > 0 ? "is-flying-yes" : "is-flying-no");
        questionCard.style.transition = "";
        questionCard.style.transform = `translateX(${direction > 0 ? 120 : -120}vw) rotate(${direction > 0 ? 16 : -16}deg)`;
        questionCard.style.backgroundColor = direction > 0 ? "#ff463a" : "#0060ff";
        questionCard.style.opacity = "0";
        questionCard.style.setProperty("--yes-opacity", direction > 0 ? 1 : 0);
        questionCard.style.setProperty("--no-opacity", direction < 0 ? 1 : 0);
        window.setTimeout(() => {
          if (state.currentIndex < total - 1) state.currentIndex += 1;
          saveState(state);
          if (isComplete(state)) {
            location.href = "test-result.html";
            return;
          }
          questionCard.classList.remove("is-flying-yes", "is-flying-no");
          resetCardMotion();
          isAnimating = false;
          renderQuestion();
        }, 280);
      }

      function optionForDirection(direction) {
        const question = questions[state.currentIndex];
        return question.options.find((option) => direction > 0 ? option.label === "是" : option.label === "否");
      }

      function renderQuestion() {
        total = questions.length;
        state.currentIndex = Math.min(Math.max(state.currentIndex || 0, 0), total - 1);
        saveState(state);
        const question = questions[state.currentIndex];
        const answered = state.answers[question.id];
        const count = answerCount(state);
        topCounter.textContent = `${count} / ${total} 已答`;
        questionCount.textContent = `第 ${state.currentIndex + 1} / ${total} 题`;
        dimensionNow.textContent = question.dimension;
        progressFill.style.width = `${(count / total) * 100}%`;
        dimensionBadge.textContent = question.dimension;
        questionTitle.textContent = question.text;
        optionsEl.innerHTML = "";
        question.options.forEach((option) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `option option-${option.label === "是" ? "yes" : "no"}`;
          if (answered?.label === option.label) button.classList.add("is-selected");
          button.setAttribute("aria-label", option.label);
          button.textContent = option.label === "是" ? "是 →" : "← 否";
          button.addEventListener("click", () => {
            answerQuestion(option, option.label === "是" ? 1 : -1);
          });
          optionsEl.appendChild(button);
        });
        prevButton.disabled = state.currentIndex === 0;
      }

      let total = questions.length;

      questionCard.addEventListener("pointerdown", (event) => {
        if (isAnimating || event.target.closest("button, a")) return;
        isDragging = true;
        dragStartX = event.clientX;
        dragStartY = event.clientY;
        dragX = 0;
        questionCard.setPointerCapture(event.pointerId);
        questionCard.classList.add("is-dragging");
      });

      questionCard.addEventListener("pointermove", (event) => {
        if (!isDragging) return;
        const dx = event.clientX - dragStartX;
        const dy = event.clientY - dragStartY;
        if (Math.abs(dx) > Math.abs(dy)) event.preventDefault();
        dragX = dx;
        applyCardMotion(dx);
      });

      questionCard.addEventListener("pointerup", () => {
        if (!isDragging) return;
        isDragging = false;
        questionCard.classList.remove("is-dragging");
        if (Math.abs(dragX) >= swipeThreshold) {
          const direction = dragX > 0 ? 1 : -1;
          const option = optionForDirection(direction);
          if (option) answerQuestion(option, direction);
          return;
        }
        resetCardMotion();
      });

      questionCard.addEventListener("pointercancel", () => {
        isDragging = false;
        questionCard.classList.remove("is-dragging");
        resetCardMotion();
      });

      prevButton.addEventListener("click", () => {
        if (state.currentIndex > 0) {
          state.currentIndex -= 1;
          saveState(state);
          resetCardMotion();
          renderQuestion();
        }
      });

      renderQuestion();
    </script>
  </body>
</html>
